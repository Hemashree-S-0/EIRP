<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/register.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card register-card p-4 shadow-lg">
            <div class="text-center mb-4">
              <h3>Create Your Account</h3>
              <p class="text-muted">Choose your path as a citizen, officer, or administrator.</p>
            </div>
            <div class="row g-3">
              <div class="col-md-4">
                <div class="form-check card p-3">
                  <input class="form-check-input" type="radio" name="role" value="citizen" checked />
                  <label class="form-check-label">Citizen</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check card p-3">
                  <input class="form-check-input" type="radio" name="role" value="officer" />
                  <label class="form-check-label">Officer</label>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-check card p-3">
                  <input class="form-check-input" type="radio" name="role" value="admin" />
                  <label class="form-check-label">Admin</label>
                </div>
              </div>
            </div>
            <form id="registerForm" class="mt-4">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="fullName" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-control" id="confirmPassword" required />
                </div>
              </div>
              <div class="mt-3">
                <div class="progress" style="height: 8px;">
                  <div class="progress-bar bg-success" id="strengthBar" style="width: 35%"></div>
                </div>
                <small id="strengthText" class="text-muted">Password strength: Weak</small>
              </div>
              <button class="btn btn-success w-100 mt-4" type="submit">Register</button>
            </form>
            <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/register.js"></script>
  </body>
</html>
