<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Incidents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/officer-dashboard.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">

      <!-- Sidebar -->
      <aside class="sidebar p-3">
        <a class="d-flex align-items-center gap-2 mb-4 text-decoration-none text-white" href="home.html">
          <img src="../assets/icons/logo.svg" alt="Logo" width="38" />
          <strong>EIRP</strong>
        </a>
        <ul class="nav flex-column gap-2">
          <li><a class="nav-link" href="officer-dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li><a class="nav-link active" href="officer-incidents.html"><i class="bi bi-clipboard-data me-2"></i>Incidents</a></li>
          <li><a class="nav-link" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><a class="nav-link" href="login.html" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4 main-content">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold mb-0">Incidents</h2>
            <p class="text-muted mb-0">Manage and update all reported incidents</p>
          </div>
          <span class="badge bg-success fs-6 px-3 py-2"><i class="bi bi-shield-check me-1"></i>Officer</span>
        </div>

        <!-- Filter Bar -->
        <div class="card border-0 shadow-sm p-3 mb-4">
          <div class="row g-2 align-items-center">
            <div class="col-md-5">
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" class="form-control border-start-0" id="searchInput" placeholder="Search by title, category, location..." />
              </div>
            </div>
            <div class="col-md-3">
              <select class="form-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="submitted">Submitted</option>
                <option value="investigating">Investigating</option>
                <option value="resolved">Resolved</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
            <div class="col-md-2">
              <select class="form-select" id="severityFilter">
                <option value="">All Severity</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-secondary w-100" id="clearFilter"><i class="bi bi-x-circle me-1"></i>Clear</button>
            </div>
          </div>
        </div>

        <!-- Incidents Table -->
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-0 pt-3 pb-0">
            <h5 class="fw-semibold">All Reported Incidents</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>#ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Severity</th>
                    <th>Location</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Update Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="incidentTableBody">
                  <tr><td colspan="9" class="text-center py-4 text-muted">Loading incidents...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/officer-incidents.js"></script>
  </body>
</html>
