<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/settings.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <h2 class="fw-bold">Settings</h2>
        <p class="text-muted">Manage your account preferences, security settings, and portal appearance.</p>
        <div class="row g-4 mt-2">
          <div class="col-lg-6"><div class="card p-3"><h5>Notifications</h5><div class="form-check form-switch"><input class="form-check-input" type="checkbox" checked /><label class="form-check-label">Email updates</label></div></div></div>
          <div class="col-lg-6"><div class="card p-3"><h5>Theme</h5><select class="form-select"><option>Light</option><option selected>Dark Green</option></select></div></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/settings.js"></script>
  </body>
</html>
