<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Incident Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../assets/css/incident-details.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">

      <!-- Sidebar -->
      <aside class="sidebar p-3">
        <a class="d-flex align-items-center gap-2 mb-4 text-decoration-none text-white" href="home.html">
          <img src="../assets/icons/logo.svg" alt="Logo" width="38" />
          <strong>EIRP</strong>
        </a>
        <ul class="nav flex-column gap-2" id="sidebarNav"></ul>
      </aside>

      <!-- Main -->
      <main class="flex-grow-1 p-4 main-content">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold mb-0" id="incidentTitle">Loading...</h2>
            <p class="text-muted mb-0" id="incidentMeta"></p>
          </div>
          <button class="btn btn-outline-success" onclick="history.back()">
            <i class="bi bi-arrow-left me-1"></i>Back
          </button>
        </div>

        <div id="errorBox" class="alert alert-danger d-none"></div>

        <div class="row g-4">

          <!-- Left: Details + Comments -->
          <div class="col-lg-7">

            <!-- Incident Details -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-info-circle-fill text-success me-2"></i>Incident Details</h5>
              <div class="row g-3" id="detailsGrid"></div>
            </div>

            <!-- Description -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
              <h5 class="fw-semibold mb-2"><i class="bi bi-file-text-fill text-success me-2"></i>Description</h5>
              <p class="mb-0" id="incidentDescription">—</p>
            </div>

            <!-- Comments -->
            <div class="card border-0 shadow-sm rounded-4 p-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-chat-dots-fill text-success me-2"></i>Comments</h5>
              <div id="commentsList"></div>
              <div id="commentFormWrapper" class="d-none mt-3">
                <textarea class="form-control mb-2" id="commentInput" rows="2" placeholder="Add a comment..."></textarea>
                <button class="btn btn-success btn-sm" id="submitComment">Post Comment</button>
              </div>
            </div>

          </div>

          <!-- Right: Status + Map + Media -->
          <div class="col-lg-5">

            <!-- Status Card -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-activity text-success me-2"></i>Status</h5>
              <div class="d-flex align-items-center gap-3">
                <span class="badge fs-6 px-3 py-2" id="statusBadge">—</span>
                <span class="text-muted small" id="reportedOn">—</span>
              </div>
            </div>

            <!-- Map -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-geo-alt-fill text-success me-2"></i>Location</h5>
              <p class="text-muted small mb-2" id="locationText">—</p>
              <div id="map"></div>
              <p class="text-muted small mt-2 mb-0" id="coordsText"></p>
            </div>

            <!-- Media -->
            <div class="card border-0 shadow-sm rounded-4 p-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-images text-success me-2"></i>Uploaded Media</h5>
              <div id="mediaGrid" class="media-grid"></div>
              <p class="text-muted small d-none" id="noMedia">No media uploaded.</p>
            </div>

          </div>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/incident-details.js"></script>
  </body>
</html>
