<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/profile.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">

      <!-- Sidebar -->
      <aside class="sidebar p-3">
        <a class="d-flex align-items-center gap-2 mb-4 text-decoration-none text-white" href="home.html">
          <img src="../assets/icons/logo.svg" alt="Logo" width="38" />
          <strong>EIRP</strong>
        </a>
        <ul class="nav flex-column gap-2" id="sidebarNav"></ul>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4 main-content">

        <!-- Header -->
        <div class="mb-4">
          <h2 class="fw-bold mb-0">My Profile</h2>
          <p class="text-muted mb-0">View and manage your account information</p>
        </div>

        <div class="row g-4">

          <!-- Profile Card -->
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
              <div class="avatar-circle mx-auto mb-3" id="avatarCircle">
                <span id="avatarInitials">?</span>
              </div>
              <h5 class="fw-bold mb-1" id="profileNameDisplay">—</h5>
              <span class="badge role-badge mb-2" id="roleBadge">—</span>
              <p class="text-muted small mb-0" id="profileEmailDisplay">—</p>
              <hr />
              <p class="text-muted small mb-0">Member since <span id="memberSince">—</span></p>
            </div>
          </div>

          <!-- Info -->
          <div class="col-lg-8">

            <!-- Personal Info -->
            <div class="card border-0 shadow-sm rounded-4 p-4">
              <h5 class="fw-semibold mb-3"><i class="bi bi-person-fill me-2 text-success"></i>Personal Information</h5>
              <div id="alertInfo" class="alert d-none"></div>
              <form id="profileForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label text-muted small">Full Name</label>
                    <input class="form-control" id="profileName" placeholder="Full Name" readonly />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label text-muted small">Email Address</label>
                    <input class="form-control" id="profileEmail" readonly />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label text-muted small">Role</label>
                    <input class="form-control" id="profileRole" readonly />
                  </div>
                </div>
              </form>
            </div>

          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/profile.js"></script>
  </body>
</html>
