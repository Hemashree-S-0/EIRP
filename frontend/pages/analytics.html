<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/analytics.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">
      <aside class="sidebar p-3">
        <a class="d-flex align-items-center gap-2 mb-4 text-decoration-none text-white" href="home.html">
          <img src="../assets/icons/logo.svg" alt="Logo" width="38" /><strong>EIRP</strong>
        </a>
        <ul class="nav flex-column gap-2">
          <li><a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li><a class="nav-link" href="incident-management.html"><i class="bi bi-clipboard-data me-2"></i>Incidents</a></li>
          <li><a class="nav-link" href="manage-users.html"><i class="bi bi-people me-2"></i>Manage Users</a></li>
          <li><a class="nav-link active" href="analytics.html"><i class="bi bi-bar-chart me-2"></i>Analytics</a></li>
          <li><a class="nav-link" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><a class="nav-link" href="login.html" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </aside>
      <main class="flex-grow-1 p-4 main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold mb-0">Analytics</h2>
            <p class="text-muted mb-0">Real-time insights from incident data in the database.</p>
          </div>
          <span class="badge bg-danger fs-6 px-3 py-2"><i class="bi bi-person-gear me-1"></i>Admin</span>
        </div>
        <!-- Stat Cards -->
        <div class="row g-4 mb-4">
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary-soft"><i class="bi bi-list-ul text-primary"></i></div>
                <div><h4 class="mb-0" id="statTotal">0</h4><small class="text-muted">Total Incidents</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning-soft"><i class="bi bi-hourglass-split text-warning"></i></div>
                <div><h4 class="mb-0" id="statPending">0</h4><small class="text-muted">Pending</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-success-soft"><i class="bi bi-check-circle text-success"></i></div>
                <div><h4 class="mb-0" id="statResolved">0</h4><small class="text-muted">Resolved</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-danger-soft"><i class="bi bi-x-circle text-danger"></i></div>
                <div><h4 class="mb-0" id="statRejected">0</h4><small class="text-muted">Rejected</small></div>
              </div>
            </div>
          </div>
        </div>
        <!-- Charts -->
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-semibold mb-3">Incident Categories</h5>
              <canvas id="categoryChart"></canvas>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-semibold mb-3">Severity Distribution</h5>
              <canvas id="severityChart"></canvas>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-semibold mb-3">Status Breakdown</h5>
              <canvas id="statusChart"></canvas>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4">
              <h5 class="fw-semibold mb-3">Incidents Over Time</h5>
              <canvas id="timelineChart"></canvas>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/analytics.js"></script>
  </body>
</html>
