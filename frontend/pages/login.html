<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <div class="login-wrapper">

      <!-- Left Panel -->
      <div class="left-panel d-none d-lg-flex">
        <div class="left-content">
          <div class="brand-logo mb-4">
            <img src="../assets/icons/logo.svg" alt="EIRP Logo" width="60" />
          </div>
          <h1 class="brand-title">EIRP</h1>
          <p class="brand-subtitle">Environmental Incident Reporting Portal</p>
          <div class="features mt-5">
            <div class="feature-item">
              <i class="bi bi-shield-check-fill"></i>
              <span>Secure & Confidential Reporting</span>
            </div>
            <div class="feature-item">
              <i class="bi bi-geo-alt-fill"></i>
              <span>Real-time Incident Tracking</span>
            </div>
            <div class="feature-item">
              <i class="bi bi-bell-fill"></i>
              <span>Instant Notifications & Updates</span>
            </div>
            <div class="feature-item">
              <i class="bi bi-bar-chart-fill"></i>
              <span>Analytics & Insights Dashboard</span>
            </div>
          </div>
        </div>
        <div class="left-overlay"></div>
      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="form-box">
          <div class="text-center mb-4 d-lg-none">
            <img src="../assets/icons/logo.svg" alt="Logo" width="48" />
          </div>
          <h2 class="form-title">Welcome Back</h2>
          <p class="form-subtitle">Sign in to your EIRP account</p>

          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="loginForm" novalidate>
            <div class="input-group-custom mb-3">
              <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
              <input type="email" class="form-input" id="email" placeholder="Email Address" required />
            </div>

            <div class="input-group-custom mb-3">
              <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-input" id="password" placeholder="Password" required />
              <span class="input-icon-right toggle-password" onclick="togglePassword()">
                <i class="bi bi-eye-fill" id="eyeIcon"></i>
              </span>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" />
                <label class="form-check-label remember-label" for="remember">Remember Me</label>
              </div>
              <a href="#" class="forgot-link" data-bs-toggle="modal" data-bs-target="#forgotModal">Forgot Password?</a>
            </div>

            <button class="btn-login w-100" type="submit">
              <span id="btnText">Sign In</span>
              <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>
          </form>

          <div class="divider my-4"><span>or</span></div>

          <p class="text-center register-text">
            Don't have an account? <a href="register.html" class="register-link">Create one</a>
          </p>
        </div>
      </div>

    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Reset Password</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="forgotAlert" class="alert d-none" role="alert"></div>
            <form id="forgotForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="forgotEmail" placeholder="Enter your registered email" required />
              </div>
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required />
              </div>
              <button type="submit" class="btn btn-success w-100" id="resetBtn">Reset Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash-fill';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye-fill';
        }
      }
    </script>
    <script src="../assets/js/login.js"></script>
  </body>
</html>
