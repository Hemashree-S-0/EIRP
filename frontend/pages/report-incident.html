<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Report Incident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../assets/css/report-incident.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold">Report Environmental Incident</h2>
            <p class="text-muted mb-0">Share the details clearly so the relevant team can respond quickly.</p>
          </div>
          <a href="citizen-dashboard.html" class="btn btn-outline-success">Back</a>
        </div>
        <form id="incidentForm">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Incident Title</label><input class="form-control" id="title" required /></div>
            <div class="col-md-6"><label class="form-label">Category</label><select class="form-select" id="category"><option>Water Pollution</option><option>Air Pollution</option><option>Waste Management</option><option>Noise Pollution</option><option>Deforestation</option></select></div>
            <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" id="description" rows="4" required></textarea></div>
            <div class="col-md-6"><label class="form-label">Date</label><input type="date" class="form-control" id="date" required /></div>
            <div class="col-md-6"><label class="form-label">Time</label><input type="time" class="form-control" id="time" required /></div>
            <div class="col-md-6"><label class="form-label">Location</label><input class="form-control" id="location" required /></div>
            <div class="col-md-3"><label class="form-label">Latitude</label><input class="form-control" id="latitude" /></div>
            <div class="col-md-3"><label class="form-label">Longitude</label><input class="form-control" id="longitude" /></div>
            <div class="col-md-6"><label class="form-label">Severity</label><select class="form-select" id="severity"><option>Low</option><option selected>Medium</option><option>High</option></select></div>
            <div class="col-md-6"><label class="form-label">Upload Images</label><input type="file" class="form-control" id="images" multiple accept="image/*" /></div>
          </div>
          <div class="mt-4">
            <label class="form-label">Map Picker</label>
            <div id="map" class="rounded-4"></div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success">Submit Report</button>
            <button type="reset" class="btn btn-outline-secondary">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/report-incident.js"></script>
  </body>
</html>
