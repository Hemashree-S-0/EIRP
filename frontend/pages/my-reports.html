<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | My Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/my-reports.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="card shadow-lg border-0 rounded-4 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold">My Reports</h2>
            <p class="text-muted mb-0">Search, filter, and track all of your submitted incidents.</p>
          </div>
          <a href="report-incident.html" class="btn btn-success">New Report</a>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4"><input class="form-control" placeholder="Search reports" /></div>
          <div class="col-md-4"><select class="form-select"><option>All Status</option><option>Pending</option><option>Investigating</option><option>Resolved</option></select></div>
          <div class="col-md-4"><select class="form-select"><option>Newest</option><option>Oldest</option></select></div>
        </div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Title</th><th>Category</th><th>Status</th><th>Location</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="reportsTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/my-reports.js"></script>
  </body>
</html>
