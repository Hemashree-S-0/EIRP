<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EIRP | Officer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/officer-dashboard.css" />
  </head>
  <body>
    <div class="d-flex min-vh-100">

      <!-- Sidebar -->
      <aside class="sidebar p-3">
        <a class="d-flex align-items-center gap-2 mb-4 text-decoration-none text-white" href="home.html">
          <img src="../assets/icons/logo.svg" alt="Logo" width="38" />
          <strong>EIRP</strong>
        </a>
        <ul class="nav flex-column gap-2">
          <li><a class="nav-link active" href="officer-dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li><a class="nav-link" href="officer-incidents.html"><i class="bi bi-clipboard-data me-2"></i>Incidents</a></li>
          <li><a class="nav-link" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><a class="nav-link" href="login.html" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4 main-content">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="fw-bold mb-0">Officer Dashboard</h2>
            <p class="text-muted mb-0">Welcome, <span id="officerName">Officer</span></p>
          </div>
          <span class="badge bg-success fs-6 px-3 py-2"><i class="bi bi-shield-check me-1"></i>Officer</span>
        </div>

        <!-- Stat Cards -->
        <div class="row g-4 mb-4">
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary-soft"><i class="bi bi-list-ul text-primary"></i></div>
                <div><h4 class="mb-0" id="totalCount">0</h4><small class="text-muted">Total Incidents</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning-soft"><i class="bi bi-hourglass-split text-warning"></i></div>
                <div><h4 class="mb-0" id="pendingCount">0</h4><small class="text-muted">Pending</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-info-soft"><i class="bi bi-search text-info"></i></div>
                <div><h4 class="mb-0" id="investigatingCount">0</h4><small class="text-muted">Investigating</small></div>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card card p-3 border-0 shadow-sm">
              <div class="d-flex align-items-center gap-3">
                <div class="stat-icon bg-success-soft"><i class="bi bi-check-circle text-success"></i></div>
                <div><h4 class="mb-0" id="resolvedCount">0</h4><small class="text-muted">Resolved</small></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Incidents Table -->
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
            <h5 class="fw-semibold">Recent Incidents</h5>
            <a href="officer-incidents.html" class="btn btn-sm btn-outline-success">View All</a>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>#ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Severity</th>
                    <th>Location</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="incidentTableBody">
                  <tr><td colspan="8" class="text-center py-4 text-muted">Loading incidents...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/officer-dashboard.js"></script>
  </body>
</html>
